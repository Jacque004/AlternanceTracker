name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement cible"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  build-backend-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: alternancetracker-backend:${{ github.sha }}

      - name: Deployment note
        run: echo "Image construite pour ${{ inputs.environment }}. Ajouter l'etape de push/deploiement selon l'infrastructure cible."

