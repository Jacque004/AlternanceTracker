<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AlternanceTracker</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 0;
        padding: 12px;
        width: 300px;
        font-size: 13px;
        color: #111827;
      }
      h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 10px;
        color: #4b5563;
        line-height: 1.45;
      }
      label {
        display: block;
        font-weight: 500;
        margin-bottom: 4px;
      }
      input[type="url"] {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 12px;
      }
      input[type="url"]:focus {
        outline: 2px solid #0284c7;
        outline-offset: 1px;
      }
      button {
        width: 100%;
        margin-top: 10px;
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button.primary {
        background: #0284c7;
        color: #fff;
      }
      button.primary:hover {
        background: #0369a1;
      }
      button.primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button.secondary {
        background: #f3f4f6;
        color: #374151;
        margin-top: 8px;
      }
      .msg {
        font-size: 12px;
        color: #b45309;
        margin-top: 8px;
      }
      .ok {
        color: #047857;
      }
    </style>
  </head>
  <body>
    <h1>Nouvelle candidature</h1>
    <p id="hint">Configurez une fois l’URL de votre app, puis ouvrez une offre dans un onglet et cliquez sur le bouton ci-dessous.</p>

    <label for="base">URL de l’application AlternanceTracker</label>
    <input type="url" id="base" placeholder="https://votre-domaine.tld ou …/AlternanceTracker" autocomplete="url" />

    <button type="button" class="secondary" id="saveBase">Enregistrer l’URL de l’app</button>

    <button type="button" class="primary" id="openApp" disabled>Ouvrir « Nouvelle candidature » avec cette page</button>

    <p id="tabUrl" class="msg" hidden></p>

    <script src="popup.js"></script>
  </body>
</html>
