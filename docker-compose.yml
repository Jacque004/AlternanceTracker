version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: alternancetracker_db
    environment:
      POSTGRES_USER: alternancetracker
      POSTGRES_PASSWORD: alternancetracker123
      POSTGRES_DB: alternancetracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - alternancetracker_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alternancetracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alternancetracker_backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://alternancetracker:alternancetracker123@postgres:5432/alternancetracker
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-in-production}
      JWT_EXPIRES_IN: 7d
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alternancetracker_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alternancetracker_frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - alternancetracker_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  alternancetracker_network:
    driver: bridge

volumes:
  postgres_data:

