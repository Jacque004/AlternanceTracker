# La passerelle Supabase vérifie le JWT avant d’exécuter la fonction.
# Le navigateur n’envoie pas d’Authorization sur la requête preflight OPTIONS,
# ce qui provoquait un 401 et l’erreur CORS « does not have HTTP ok status ».
# https://supabase.com/docs/guides/functions/cors
[functions.generate-cover-letter]
verify_jwt = false

# Appelées par pg_cron / cron externe avec CRON_SECRET (pas de JWT utilisateur).
[functions.send-reminders]
verify_jwt = false

[functions.send-weekly-summary]
verify_jwt = false

# Même problème CORS que generate-cover-letter : le preflight OPTIONS n’envoie pas le JWT ;
# la passerelle répondait 401 avant la fonction. verify_jwt = false + contrôle du JWT dans le code Deno.
[functions.fetch-job-metadata]
verify_jwt = false
